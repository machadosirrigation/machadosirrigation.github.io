<script>
document.getElementById("estimateForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = e.target;

  const payload = {
    name: form.name.value,
    phone: form.phone.value,
    email: form.email.value,
    address: form.address.value,
    serviceType: form.serviceType.value,
    message: form.message.value,
    preferredDate: form.preferredDate.value
  };

  try {
    const res = await fetch("https://machados-serviceops.vercel.app/api/website-request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    console.log("API status:", res.status);
    console.log("API response:", text);

    let data = {};
    try {
      data = JSON.parse(text);
    } catch {}

    if (!res.ok) {
      alert((data && data.error) || text || "Something went wrong.");
      return;
    }

    alert("Request sent! We will contact you soon.");
    form.reset();
  } catch (err) {
    console.error(err);
    alert("Could not reach the CRM server.");
  }
});
</script>
